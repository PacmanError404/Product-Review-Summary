<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Product preview card component</title>
  <link rel="stylesheet" href="https://fonts.google.com/specimen/Fraunces">
  <link rel="stylesheet" href="https://fonts.google.com/specimen/Montserrat">
  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

<div class="card" id="photo"><img src="image-product-desktop.jpg" alt=""></div>
<div class="card" id="content">
  <div id="perfume">PERFUME</div>
  <div id="heading">  Gabrielle Essence Eau De Parfum</div>
  <div id="main">A floral, solar and voluptuous interpretation composed by Olivier Polge, 
  Perfumer-Creator for the House of CHANEL.</div>
  <div class="price">
  <div id="price1">  $149.99</div>
  <div id="price2">  <s>$169.99</s></div>
  </div>
  <div class="btn"><div id="button"> <img src="icon-cart.svg" alt=""><a href="#">Add to Cart</a></div>
  </div>
</div>

</body>
</html>
